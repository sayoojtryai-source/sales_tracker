{% extends "base.html" %}
{% block title %}{% if customer %}Edit Customer{% else %}Add Customer{% endif %}{% endblock %}
{% block content %}
<section class="page-head">
  <h1>{% if customer %}Edit Customer{% else %}Add Customer{% endif %}</h1>
  <a class="btn btn-ghost" href="{{ url_for('customers_list') }}">← Back</a>
</section>

<form method="post" class="card stack">
  <div class="form-grid">
    <label>Name <span style="color:var(--danger)">*</span>
      <input name="name" required value="{{ customer.name if customer else '' }}" placeholder="Customer name" />
    </label>
    <label>Phone <span style="color:var(--danger)">*</span>
      <input name="phone" required inputmode="tel" value="{{ customer.phone if customer else '' }}" placeholder="+91..." />
    </label>
    <label>Email (optional)
      <input name="email" type="email" value="{{ customer.email if customer else '' }}" placeholder="email@example.com" />
    </label>
    <label class="full">Address (optional)
      <textarea name="address" rows="2" placeholder="Delivery address">{{ customer.address if customer else '' }}</textarea>
    </label>
    <label class="full">Notes (optional)
      <textarea name="notes" rows="2" placeholder="Any extra info">{{ customer.notes if customer else '' }}</textarea>
    </label>
  </div>
  <div class="actions">
    <button class="btn btn-primary" type="submit">{% if customer %}Save changes{% else %}Add Customer{% endif %}</button>
    <a class="btn btn-ghost" href="{{ url_for('customers_list') }}">Cancel</a>
  </div>
</form>
{% endblock %}
